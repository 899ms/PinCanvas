name: ✨ 功能建议
description: 建议新功能或改进现有功能
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请帮助我们理解你的需求与使用场景。

        > 💡 **提示**：对于大型功能或方向性讨论，建议先在 [Discussions](https://github.com/tdsoc2002/PinCanvas/discussions) 中发起讨论，达成共识后再开 Issue。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索过现有 Issues 和 Discussions，未发现重复建议
          required: true
        - label: 此建议符合 PinCanvas 的项目定位（节点式 AI 创作画布）
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 这个功能是为了解决什么实际问题？请描述使用场景。
      placeholder: |
        例如：作为一个创作者，我需要把生成的图片批量导出为 ZIP 文件，
        目前只能一张一张右键保存，效率很低。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你设想中的功能应该是怎样的？
      placeholder: |
        例如：在画布右上角增加「批量导出」按钮，可以选择导出全部或选中节点的产物，
        打包为 ZIP 文件并按节点 ID/时间命名。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过哪些其他方案？为什么不采用？
      placeholder: |
        例如：考虑过让用户手动用浏览器扩展批量下载，但这需要用户额外安装工具，
        体验不如内置功能。
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      description: 这个功能涉及哪些模块？（可多选）
      multiple: true
      options:
        - 画布交互（节点、连线、撤销/重做）
        - API 适配（OpenAI / Midjourney / Jimeng / Seedance / 其他）
        - 节点类型（新增/修改）
        - 持久化（IndexedDB / localStorage / 导入导出）
        - UI 组件（Header / Toolbar / 设置面板）
        - 模型管理
        - 文档与示例
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（个人观点）
      description: 这对你有多重要？
      options:
        - 🔥 阻塞性 — 没有它无法使用 PinCanvas
        - 🚀 高 — 显著改善体验
        - 📌 中 — 锦上添花
        - 💭 低 — 偶尔会用到
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: 草图 / 参考实现
      description: 如果你有界面草图、参考产品截图或伪代码，请附在这里
      placeholder: 可拖拽图片到此处上传
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      description: 你愿意参与这个功能的实现吗？
      options:
        - label: 我愿意提交 PR 实现这个功能
        - label: 我可以协助测试
        - label: 我可以协助编写文档
