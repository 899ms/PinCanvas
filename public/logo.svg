<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- 画布外框（虚线，弱化作为衬底） -->
  <rect x="32" y="32" width="192" height="192" rx="16" ry="16"
        fill="none" stroke="url(#brandGrad)" stroke-width="3"
        stroke-dasharray="6 6" opacity="0.35"/>

  <!-- 四角节点 + 连线（节点画布意象） -->
  <line x1="40" y1="40" x2="128" y2="100" stroke="url(#brandGrad)" stroke-width="2.5" opacity="0.45"/>
  <line x1="216" y1="40" x2="128" y2="100" stroke="url(#brandGrad)" stroke-width="2.5" opacity="0.45"/>
  <line x1="40" y1="216" x2="128" y2="180" stroke="url(#brandGrad)" stroke-width="2.5" opacity="0.45"/>
  <line x1="216" y1="216" x2="128" y2="180" stroke="url(#brandGrad)" stroke-width="2.5" opacity="0.45"/>

  <circle cx="40" cy="40" r="11" fill="url(#brandGrad)"/>
  <circle cx="40" cy="40" r="4" fill="white"/>
  <circle cx="216" cy="40" r="11" fill="url(#brandGrad)"/>
  <circle cx="216" cy="40" r="4" fill="white"/>
  <circle cx="40" cy="216" r="11" fill="url(#brandGrad)"/>
  <circle cx="40" cy="216" r="4" fill="white"/>
  <circle cx="216" cy="216" r="11" fill="url(#brandGrad)"/>
  <circle cx="216" cy="216" r="4" fill="white"/>

  <!-- 图钉：针体阴影 -->
  <ellipse cx="128" cy="200" rx="22" ry="4" fill="#1e3a8a" opacity="0.18"/>

  <!-- 图钉：针体 -->
  <path d="M 124 162 L 132 162 L 128 200 Z" fill="#1e3a8a"/>

  <!-- 图钉：底盘 -->
  <ellipse cx="128" cy="162" rx="36" ry="8" fill="#1d4ed8"/>

  <!-- 图钉：头部主体 -->
  <ellipse cx="128" cy="130" rx="42" ry="38" fill="url(#capGrad)"/>

  <!-- 图钉：底盘与头部连接环 -->
  <ellipse cx="128" cy="162" rx="42" ry="6" fill="url(#brandGrad)"/>

  <!-- 图钉：高光 -->
  <ellipse cx="112" cy="112" rx="14" ry="9" fill="white" opacity="0.5"/>
  <ellipse cx="108" cy="108" rx="6" ry="4" fill="white" opacity="0.85"/>
</svg>
